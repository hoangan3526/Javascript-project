<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Modal</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <button id="open-modal-1" class="btn">Open Modal 1</button>
            <button id ="open-modal-2" class="btn">Open Modal 2</button>
            <button id="open-modal-3" class="btn">Open Modal 3</button>
        </main>
        <template id ="modal-1">
            <h1>hello hoang an</h1>
            <p> Lorem ipsum dolor, sit amet consectetur adipisicing elit. Debitis vero consectetur quam at esse ipsum ut officia incidunt cum provident.</p>
        </template>
        <template id="modal-2">
            <h1>Login</h1>
            <form action="" id="login-form">
                <input
                    type="email"
                    placeholder="Enter your email..."
                    id="email"
                />
                <br />
                <input
                    type="password"
                    placeholder="Enter your password..."
                    id="password"
                />
                <br />
                <button type="submit">Login</button>
            </form>
        </template>
        <!-- Modal -->
        
        <script src="main.js"></script>
    </body>
</html>
